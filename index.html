<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Salary Designer | V2</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app-container">
    <header class="designer-header">
        <div>
            <h1>Retirement Salary Designer</h1>
            <p class="subtitle">Personal Architecture: 2026/27</p>
        </div>
    </header>

    <div class="main-layout">
        <main class="controls-section">
            
            <section class="pillar-section" id="pillar-foundations">
                <div class="pillar-header">
                    <h2>1. Foundations <span class="info-icon" title="Daily essentials: Food, Energy, Tech.">ⓘ</span></h2>
                    <span class="live-price" id="val-foundations">£18,200</span>
                </div>
                <input type="range" class="blender-slider" id="slider-foundations" min="0" max="100" value="50">
                <div class="slider-labels"><span>Staples</span><span>Signature</span><span>Designer</span></div>
                
                <button class="text-btn" onclick="togglePersonalize('foundations')">+ Personalise via Weekly Food Spend</button>
                <div class="personalize-panel" id="pers-foundations">
                    <label>Weekly Food Spend (£):</label>
                    <input type="number" id="input-food" placeholder="e.g. 100">
                    <button onclick="extrapolateFoundations()">Apply & Adjust</button>
                    <div class="breakdown-data" id="breakdown-foundations"></div>
                </div>
            </section>

            <section class="pillar-section" id="pillar-home">
                <div class="pillar-header">
                    <h2>2. Structure <span class="info-icon" title="Social Rent = Subsidized housing via council/association.">ⓘ</span></h2>
                    <span class="live-price" id="val-home">£9,100</span>
                </div>
                <div class="tenure-toggle">
                    <button class="toggle-btn active" data-tenure="owner">Owner</button>
                    <button class="toggle-btn" data-tenure="private">Private Rent</button>
                    <button class="toggle-btn" data-tenure="social">Social Rent</button>
                </div>
                <input type="range" class="blender-slider" id="slider-home" min="0" max="100" value="50">
                <div class="slider-labels"><span>Staples</span><span>Signature</span><span>Designer</span></div>
            </section>

            <section class="pillar-section" id="pillar-wellness">
                <div class="pillar-header">
                    <h2>3. Wellness <span class="info-icon" title="Health certainty, travel, and leisure.">ⓘ</span></h2>
                    <span class="live-price" id="val-wellness">£16,000</span>
                </div>
                <input type="range" class="blender-slider" id="slider-wellness" min="0" max="100" value="50">
                <div class="slider-labels"><span>Staples</span><span>Signature</span><span>Designer</span></div>
                <div class="breakdown-data" id="breakdown-wellness"></div>
            </section>
        </main>

        <aside class="outputs-section">
            <div class="chart-card">
                <h3>Salary Shape</h3>
                <canvas id="donutChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Evolution (Age 67 - 90)</h3>
                <canvas id="lineChart"></canvas>
            </div>
        </aside>
    </div>

    <footer class="salary-summary-bar">
        <div class="summary-content">
            <div class="metric">
                <label>Net Need</label>
                <span id="display-net">£0</span>
            </div>
            <div class="metric tax-metric">
                <label>Tax</label>
                <span id="display-tax">+ £0</span>
            </div>
            <div class="metric primary">
                <label>Gross Salary</label>
                <span id="display-salary">£0</span>
            </div>
            <button class="spec-btn" onclick="alert('Downloading JSON Config...')">Download</button>
        </div>
    </footer>
</div>

<script src="js/script.js"></script>
</body>
</html>
